<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="style.css">
<style>
  .stage{--w:853px;--h:1844px}
  .logo{top:40px;width:310px}
  .lock.top{top:248px}
  .eyebrow{font-size:23px}
  .title{font-size:106px;margin-top:14px}
  .pill{font-size:38px;padding:14px 34px;margin-top:26px}
  .rule{margin:30px auto 0;width:50%}
  .elo{font-size:40px;margin-top:22px}
  .fineprint{font-size:16px;letter-spacing:.07em;margin-top:20px}
  /* monkey character, anchored bottom-left like the in-app composite */
  .monkey{position:absolute;left:-90px;bottom:0;width:520px;z-index:2;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,.55))}
</style></head>
<body>
<div class="stage">
  <img class="bg" src="assets/login-island.jpg">
  <div class="scrim-top" style="height:62%"></div>
  <img class="monkey" src="assets/login-monkey.png">

  <img class="logo" src="assets/flag-logo.png">

  <div class="lock top">
    <div class="eyebrow">1v1 Texas Hold'em</div>
    <div class="title">HEADS-UP<br><span class="gold">POKER</span></div>
    <div><span class="pill">100<span style="font-size:.7em">%</span> FREE-TO-PLAY</span></div>
    <div class="rule"></div>
    <div class="elo">CLIMB FUN <span class="gold">ELO</span> LEADERBOARDS</div>
    <div class="fineprint">No real-money gambling<span class="sep">•</span>No cash prizes<span class="sep">•</span>No withdrawals</div>
  </div>
</div>
</body></html>
