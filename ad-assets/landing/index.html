<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Poker Monkey — landing preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0a1628;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  #hero{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;display:block}

  /* ---- faithful replica of LoginScreen.jsx login card ---- */
  #login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-end;padding:24px;padding-bottom:38px;z-index:5}
  #login.off{display:none}
  .card{background:#12121e;border:3px solid rgba(222,184,110,.9);border-radius:18px;
    width:100%;max-width:400px;padding:22px;display:flex;flex-direction:column;gap:16px;
    box-shadow:0 0 18px rgba(240,192,64,.45)}
  .googleBtn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;
    border:none;border-radius:50px;padding:13px 0;font-size:15px;font-weight:600;color:#444;cursor:pointer}
  .googleBtn .g{font-size:17px;font-weight:700;color:#4285F4}
  .divider{display:flex;align-items:center;gap:10px}
  .divider .line{flex:1;height:1px;background:rgba(255,255,255,.15)}
  .divider .or{color:rgba(255,255,255,.4);font-size:12px}
  .seclabel{color:#9aa4b2;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .input{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);border-radius:8px;
    padding:12px 14px;color:#fff;font-size:16px}
  .input::placeholder{color:#9aa4b2}
  .joinBtn{background:#f0c040;border:none;border-radius:12px;padding:14px 0;text-align:center;
    color:#000;font-size:16px;font-weight:900;letter-spacing:1px;cursor:pointer;
    box-shadow:0 0 12px rgba(240,192,64,.4)}
  .ver{position:fixed;right:12px;bottom:12px;z-index:6;font-size:11px;color:rgba(255,255,255,.9);
    text-shadow:0 1px 4px rgba(0,0,0,.9)}

  /* tiny dev HUD — not part of the asset */
  #hud{position:fixed;left:12px;top:12px;z-index:10;display:flex;gap:8px;align-items:center;flex-wrap:wrap;max-width:92vw;
    background:rgba(8,16,28,.72);backdrop-filter:blur(6px);border:1px solid rgba(222,184,110,.5);
    border-radius:10px;padding:8px 12px;color:#e9d9ad;font-size:13px;font-weight:600;letter-spacing:.02em}
  #hud b{color:#f0c040}
  #hud button{cursor:pointer;border:1px solid rgba(222,184,110,.6);background:rgba(240,192,64,.12);
    color:#f4e3b8;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700}
  #hud button:hover{background:rgba(240,192,64,.24)}
  #hud .hide{opacity:.55;font-weight:500}
</style></head>
<body>
  <img id="hero" alt="Poker Monkey landing">

  <!-- login dialog replica -->
  <div id="login">
    <div class="card">
      <button class="googleBtn"><span class="g">G</span> Log in with Google</button>
      <div class="divider"><span class="line"></span><span class="or">or</span><span class="line"></span></div>
      <div class="seclabel">Play as Guest</div>
      <input class="input" placeholder="Enter your name">
      <button class="joinBtn">Play as Guest</button>
    </div>
  </div>
  <div class="ver" id="ver"></div>

  <div id="hud">
    <span>viewport <b id="vp"></b></span>
    <span>· asset <b id="file"></b></span>
    <button id="dlg">dialog: on</button>
    <button id="swap">swap phone art</button>
    <span class="hide">(H hide · D dialog · S swap)</span>
  </div>

<script>
  const SET = {
    u219: 'login-bg-21-9-landing.png',   // 1915x821
    w169: 'login-bg-16-9-landing.png',   // 1672x941
    t43:  'login-bg-4-3-landing.png',    // 1448x1086
    p919: 'login-bg-9-19-landing.png',   // 852x1846  (pirate-monkey scene)
    pisl: 'login-island-landing.png',    // 853x1844  (island + monkey)
  };
  const PORTRAITS = ['p919','pisl'];
  const VERSION = 'v5.192 (b30.10)';
  let pIdx = 0, dialog = true;

  const hero = document.getElementById('hero');
  const vpEl = document.getElementById('vp');
  const fileEl = document.getElementById('file');
  document.getElementById('ver').textContent = VERSION;

  function pick(){
    const w = innerWidth, h = innerHeight, ar = w/h;
    let key;
    if (ar >= 2.0)      key = 'u219';
    else if (ar >= 1.5) key = 'w169';
    else if (ar >= 1.0) key = 't43';
    else                key = PORTRAITS[pIdx];
    const file = SET[key];
    if (!hero.src.endsWith(file)) hero.src = file;
    vpEl.textContent = w + '×' + h + '  (' + ar.toFixed(2) + ':1)';
    fileEl.textContent = file;
  }
  function setDialog(on){
    dialog = on;
    document.getElementById('login').classList.toggle('off', !on);
    document.getElementById('ver').style.display = on ? 'block' : 'none';
    document.getElementById('dlg').textContent = 'dialog: ' + (on ? 'on' : 'off');
  }

  addEventListener('resize', pick);
  document.getElementById('swap').onclick = () => { pIdx = (pIdx+1) % PORTRAITS.length; pick(); };
  document.getElementById('dlg').onclick  = () => setDialog(!dialog);
  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'h') document.getElementById('hud').style.display =
      (document.getElementById('hud').style.display === 'none' ? 'flex' : 'none');
    if (k === 'd') setDialog(!dialog);
    if (k === 's') document.getElementById('swap').click();
  });
  pick(); setDialog(true);
</script>
</body></html>
