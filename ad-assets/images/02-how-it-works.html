<!doctype html>
<html><head><meta charset="utf-8">
<style>
@import url('../fonts/fonts.css');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Archivo Black',system-ui}
.stage{position:relative;width:1080px;height:1920px;overflow:hidden;
  background:radial-gradient(120% 80% at 50% 0%, #1a6b3a 0%, #0a3d1f 55%, #062414 100%)}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.18}
.head{position:absolute;top:90px;left:0;right:0;text-align:center;font-family:'Anton';
  color:#f0c040;font-size:104px;text-transform:uppercase;line-height:.95;
  text-shadow:0 6px 0 #7a5300,0 10px 26px rgba(0,0,0,.7)}
.head small{display:block;color:#fff;font-size:48px;letter-spacing:8px;margin-top:14px}
.steps{position:absolute;top:430px;left:70px;right:70px;display:flex;flex-direction:column;gap:46px}
.step{display:flex;align-items:center;gap:40px;background:rgba(7,28,17,.72);
  border:3px solid rgba(240,192,64,.55);border-radius:32px;padding:42px 46px;
  box-shadow:0 16px 40px rgba(0,0,0,.45)}
.num{flex:0 0 130px;height:130px;border-radius:50%;background:linear-gradient(180deg,#f0c040,#d4a017);
  color:#1a1a2e;font-family:'Anton';font-size:84px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 0 #8a6500}
.txt h2{font-family:'Anton';color:#fff;font-size:70px;text-transform:uppercase;line-height:1}
.txt p{color:#cfe8d6;font-size:40px;margin-top:8px;font-family:system-ui;font-weight:700}
.chip{margin-left:auto;width:120px;height:120px;object-fit:contain;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.5))}
.bottom{position:absolute;bottom:110px;left:0;right:0;text-align:center}
.cta{display:inline-block;background:linear-gradient(180deg,#c0392b,#92271c);color:#fff;
  font-family:'Anton';font-size:64px;padding:28px 64px;border-radius:22px;letter-spacing:2px;
  box-shadow:0 12px 0 #5e160f,0 22px 38px rgba(0,0,0,.55);text-transform:uppercase}
.sub{margin-top:28px;color:#f0c040;font-family:'Anton';font-size:50px;letter-spacing:3px}
</style></head>
<body>
<div class="stage">
  <img class="bg" src="../assets/login-island.jpg">
  <div class="head">3 TAPS TO A<br>SHOWDOWN<small>NO SETUP • NO WAITING</small></div>
  <div class="steps">
    <div class="step"><div class="num">1</div><div class="txt"><h2>TAP PLAY</h2><p>Jump straight into the queue</p></div><img class="chip" src="../assets/chip-red.png"></div>
    <div class="step"><div class="num">2</div><div class="txt"><h2>GET MATCHED</h2><p>Paired with a real player in seconds</p></div><img class="chip" src="../assets/chip-blue.png"></div>
    <div class="step"><div class="num">3</div><div class="txt"><h2>WIN ELO</h2><p>Climb the leaderboard, heads-up</p></div><img class="chip" src="../assets/chip-green.png"></div>
  </div>
  <div class="bottom">
    <div class="cta">DOWNLOAD FREE</div>
    <div class="sub">pokermonkey.app</div>
  </div>
</div>
</body></html>
