<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../style.css">
<style>
.fff{position:absolute;top:300px;left:0;right:0;text-align:center;font-family:'Anton';line-height:.9;z-index:3}
.fff div{font-size:170px;text-transform:uppercase;text-shadow:0 6px 0 #7a5300,0 12px 30px rgba(0,0,0,.8)}
.fff .f1{color:#f0c040}.fff .f2{color:#fff}.fff .f3{color:#2ecc71}
.vals{position:absolute;top:860px;left:64px;right:64px;display:flex;flex-direction:column;gap:24px;z-index:3}
.val{display:flex;align-items:center;gap:34px;background:rgba(7,28,17,.74);border:3px solid rgba(240,192,64,.5);
  border-radius:30px;padding:30px 40px}
.val img{width:120px;height:120px;border-radius:50%;border:5px solid #f0c040;object-fit:cover;background:#0b1420}
.val .vt{font-family:'Anton';color:#fff;font-size:58px;text-transform:uppercase;line-height:1}
.val .vt span{color:#f0c040;display:block;font-family:system-ui;font-weight:800;font-size:34px;margin-top:6px}
</style></head>
<body>
<div class="stage grad-jungle">
  <img class="bg bg-dim" src="../assets/jungle-menu.png">
  <div class="vgrad"></div>

  <div class="kicker" style="position:absolute;top:150px;left:0;right:0;text-align:center;z-index:3">Heads-up poker, zero friction</div>
  <div class="fff"><div class="f1">FUN</div><div class="f2">FAST</div><div class="f3">FREE</div></div>

  <div class="vals">
    <div class="val"><img src="../assets/banana.png"><div class="vt">FUN<span>Monkey avatars, big all-in moments</span></div></div>
    <div class="val"><img src="../assets/lemur.png"><div class="vt">FAST<span>Matched with a real player in seconds</span></div></div>
    <div class="val"><img src="../assets/sailor.png"><div class="vt">FREE<span>$0 to play. No catch, no chips to buy</span></div></div>
  </div>

  <div class="bottom">
    <div class="cta">PLAY FREE NOW</div>
    <div class="sub">pokermonkey<span class="d">.</span>app</div>
  </div>
</div>
</body></html>
