<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../style.css">
<style>
.roster{position:absolute;top:720px;left:0;right:0;display:flex;justify-content:center;gap:0;z-index:3}
.roster img{width:172px;height:172px;border-radius:50%;border:6px solid #f0c040;object-fit:cover;
  background:#0b1420;margin-left:-34px;box-shadow:0 12px 24px rgba(0,0,0,.5)}
.roster img:first-child{margin-left:0}
.feat{position:absolute;top:940px;left:0;right:0;text-align:center;z-index:3}
.feat span{color:#e9f7ee;font-family:'Anton';font-size:40px;letter-spacing:1px}
.feat .d{color:#f0c040}
</style></head>
<body>
<div class="stage grad-jungle">
  <img class="bg bg-dim" src="../assets/login-island.jpg">
  <div class="vgrad"></div>
  <div class="badge">FREE</div>

  <div class="top">
    <div class="kicker">1v1 Texas Hold'em</div>
    <div class="head sm">THE MOST FUN<br>FREE <span class="gold">HEADS-UP</span><br>POKER</div>
  </div>

  <!-- avatar roster: the cast of monkeys -->
  <div class="roster">
    <img src="../assets/captain.png"><img src="../assets/queen.png"><img src="../assets/cigar.png">
    <img src="../assets/baboon.png"><img src="../assets/parrot.png"><img src="../assets/lemur.png">
  </div>

  <div class="feat"><span>REAL PLAYERS</span><span class="d"> • </span><span>INSTANT MATCHES</span><span class="d"> • </span><span>WIN ELO</span></div>

  <!-- real gameplay screenshot -->
  <div class="shot" style="width:500px;height:600px;left:290px;top:1010px;transform:rotate(2deg)">
    <img src="../assets/shots/showdown.png" style="object-position:center 6%">
  </div>

  <div class="bottom">
    <div class="cta">PLAY NOW</div>
    <div class="sub">pokermonkey<span class="d">.</span>app</div>
  </div>
</div>
</body></html>
