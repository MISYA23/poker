<!doctype html>
<html><head><meta charset="utf-8">
<style>
@import url('../fonts/fonts.css');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Archivo Black',system-ui}
.stage{position:relative;width:1080px;height:1920px;background:#0a3d1f;overflow:hidden}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vgrad{position:absolute;inset:0;background:
  linear-gradient(180deg, rgba(5,20,12,.86) 0%, rgba(5,20,12,.15) 32%, rgba(5,20,12,.15) 55%, rgba(5,20,12,.92) 100%)}
.top{position:absolute;top:90px;left:0;right:0;padding:0 70px;text-align:center}
.kicker{font-family:'Anton';color:#f0c040;letter-spacing:6px;font-size:46px;text-transform:uppercase;
  text-shadow:0 4px 14px rgba(0,0,0,.7)}
.head{font-family:'Anton';color:#fff;font-size:138px;line-height:.95;margin-top:18px;text-transform:uppercase;
  text-shadow:0 6px 0 #c0392b, 0 10px 28px rgba(0,0,0,.8)}
.head .gold{color:#f0c040;text-shadow:0 6px 0 #7a5300,0 10px 28px rgba(0,0,0,.8)}
.bottom{position:absolute;bottom:120px;left:0;right:0;text-align:center;padding:0 70px}
.cta{display:inline-block;background:linear-gradient(180deg,#f0c040,#d4a017);color:#1a1a2e;
  font-family:'Anton';font-size:72px;padding:30px 70px;border-radius:24px;letter-spacing:2px;
  box-shadow:0 14px 0 #8a6500,0 24px 40px rgba(0,0,0,.6);text-transform:uppercase}
.sub{margin-top:34px;color:#fff;font-family:'Anton';font-size:54px;letter-spacing:3px;
  text-shadow:0 3px 12px rgba(0,0,0,.8)}
.dot{color:#f0c040}
.badge{position:absolute;top:50px;right:54px;background:#c0392b;color:#fff;font-family:'Anton';
  font-size:38px;padding:14px 28px;border-radius:50px;transform:rotate(8deg);
  box-shadow:0 8px 20px rgba(0,0,0,.5)}
</style></head>
<body>
<div class="stage">
  <img class="bg" src="../assets/login-bg-9-19.jpg">
  <div class="vgrad"></div>
  <div class="badge">100% FREE</div>
  <div class="top">
    <div class="kicker">Real 1v1 Texas Hold'em</div>
    <div class="head">CAN YOU<br>BEAT THE<br><span class="gold">MONKEY?</span></div>
  </div>
  <div class="bottom">
    <div class="cta">PLAY NOW</div>
    <div class="sub">pokermonkey<span class="dot">.</span>app</div>
  </div>
</div>
</body></html>
